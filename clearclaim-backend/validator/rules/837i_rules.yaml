rules:
  - rule_id: "837I_MISSING_BILLING_PROV_NAME"
    description: "NM1 segment is required in Loop 2010AA"
    applies_to_types: ["837I"]
    check_type: "required_segment"
    severity: "error"
    error_code: "MISSING_BILLING_PROVIDER"
    plain_english: "The required Billing Provider Name segment (NM1) is missing from Loop 2010AA."
    loop_id: "2010AA"
    segment_id: "NM1"

  - rule_id: "837I_INVALID_FACILITY_CODE"
    description: "CLM05-1 must be a valid CMS facility code"
    applies_to_types: ["837I"]
    check_type: "enum"
    severity: "error"
    error_code: "INVALID_FACILITY_CODE"
    plain_english: "The facility code '{raw_value}' is not a valid CMS Place of Service code."
    segment_id: "CLM"
    element_position: 5
    valid_values: ["11", "12", "21", "22", "23", "31", "41", "49", "50", "51", "52", "61", "65", "71", "81", "99"]

  - rule_id: "837I_CLM_AMOUNT_MISMATCH"
    description: "CLM02 must equal sum of SV1-02"
    applies_to_types: ["837I", "837P"]
    check_type: "cross_segment_sum"
    severity: "error"
    error_code: "CLM_AMOUNT_MISMATCH"
    plain_english: "The total billed amount '{raw_value}' does not match the sum of service line amounts ({sum_value})."
    loop_id: "2300"
    source_segment: "CLM"
    source_element: 2
    sum_segment: "SV1"
    sum_element: 2
    sum_loop: "2400"

  - rule_id: "837I_MISSING_ROI_CODE"
    description: "CLM09 Release of Information Code is required"
    applies_to_types: ["837I"]
    check_type: "regex"
    severity: "error"
    error_code: "MISSING_ROI_CODE"
    plain_english: "The Release of Information Code in CLM09 is missing or invalid. Must be 'Y' or 'I'."
    segment_id: "CLM"
    element_position: 9
    pattern: "^(Y|I)$"